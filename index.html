<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مشغل القنوات</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
  :root{
    --bg:#0b0e14; --panel:#121722; --panel2:#1a2230;
    --line:#232c3d; --txt:#e6ecf5; --dim:#8896ab;
    --gold:#d4af37; --gold-soft:#e8c766; --live:#e5484d;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Segoe UI',Tahoma,system-ui,sans-serif;
    background:var(--bg); color:var(--txt); height:100vh; overflow:hidden;
  }
  .app{display:grid; grid-template-columns:340px 1fr; height:100vh}

  /* Sidebar */
  .sidebar{background:var(--panel); border-inline-start:1px solid var(--line); display:flex; flex-direction:column; min-height:0}
  .brand{padding:18px 20px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--gold);box-shadow:0 0 12px var(--gold)}
  .brand h1{font-size:17px; letter-spacing:.5px}
  .brand span{color:var(--gold-soft)}
  .search{padding:12px 16px; border-bottom:1px solid var(--line)}
  .search input{
    width:100%; background:var(--panel2); border:1px solid var(--line); color:var(--txt);
    padding:11px 14px; border-radius:10px; font-size:14px; outline:none;
  }
  .search input:focus{border-color:var(--gold)}
  .groups{display:flex; gap:8px; padding:12px 16px; overflow-x:auto; border-bottom:1px solid var(--line)}
  .groups button{
    white-space:nowrap; background:var(--panel2); border:1px solid var(--line); color:var(--dim);
    padding:7px 14px; border-radius:20px; font-size:13px; cursor:pointer; transition:.15s;
  }
  .groups button.active{background:var(--gold); color:#1a1200; border-color:var(--gold); font-weight:600}
  .list{flex:1; overflow-y:auto; padding:8px}
  .ch{
    display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:10px;
    cursor:pointer; transition:.15s; margin-bottom:2px;
  }
  .ch:hover{background:var(--panel2)}
  .ch.active{background:linear-gradient(90deg,rgba(212,175,55,.18),transparent); box-shadow:inset 3px 0 0 var(--gold)}
  .ch img{width:38px;height:38px;border-radius:8px;background:var(--panel2);object-fit:contain;padding:4px}
  .ch .meta{flex:1; min-width:0}
  .ch .name{font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .ch .grp{font-size:11px; color:var(--dim)}

  /* Player */
  .main{display:flex; flex-direction:column; min-width:0}
  .video-wrap{flex:1; background:#000; position:relative; display:flex; align-items:center; justify-content:center}
  video{width:100%; height:100%; object-fit:contain}
  .placeholder{position:absolute; text-align:center; color:var(--dim)}
  .placeholder .icon{font-size:56px; margin-bottom:12px; opacity:.4}
  .loader{position:absolute; width:44px;height:44px; border:3px solid var(--line); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; display:none}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err{position:absolute; background:rgba(229,72,77,.12); border:1px solid var(--live); color:#ffb0b2; padding:14px 20px; border-radius:12px; display:none; max-width:80%; text-align:center}

  .bar{padding:16px 22px; background:var(--panel); border-top:1px solid var(--line); display:flex; align-items:center; gap:14px}
  .bar .live{display:none; align-items:center; gap:6px; background:rgba(229,72,77,.15); color:var(--live); padding:4px 10px; border-radius:6px; font-size:12px; font-weight:700}
  .bar .live .b{width:7px;height:7px;border-radius:50%;background:var(--live);animation:pulse 1.4s infinite}
  @keyframes pulse{50%{opacity:.3}}
  .bar .title{flex:1; font-size:16px; font-weight:600}
  .bar .title small{display:block; color:var(--dim); font-weight:400; font-size:12px; margin-top:2px}
  .count{color:var(--dim); font-size:13px}
</style>
</head>
<body>
<div class="app">
  <main class="main">
    <div class="video-wrap">
      <video id="video" controls playsinline></video>
      <div class="placeholder" id="ph"><div class="icon">📺</div><div>اختر قناة للبدء بالمشاهدة</div></div>
      <div class="loader" id="loader"></div>
      <div class="err" id="err"></div>
    </div>
    <div class="bar">
      <div class="live" id="liveBadge"><span class="b"></span>مباشر</div>
      <div class="title" id="nowPlaying">لا يوجد بث<small id="nowGroup"></small></div>
      <div class="count" id="count"></div>
    </div>
  </main>

  <aside class="sidebar">
    <div class="brand"><span class="dot"></span><h1>مشغل <span>القنوات</span></h1></div>
    <div class="search"><input id="search" type="text" placeholder="ابحث عن قناة..."></div>
    <div class="groups" id="groups"></div>
    <div class="list" id="list"></div>
  </aside>
</div>

// ---- Parse M3U ----
function parseM3U(text){
  const lines = text.split(/\r?\n/);
  const out = [];
  for(let i=0;i<lines.length;i++){
    const l = lines[i].trim();
    if(l.startsWith('#EXTINF')){
      const logo = (l.match(/tvg-logo="([^"]*)"/)||[])[1] || '';
      const group = (l.match(/group-title="([^"]*)"/)||[])[1] || 'أخرى';
      const name = l.substring(l.lastIndexOf(',')+1).trim();
      let url = '';
      for(let j=i+1;j<lines.length;j++){
        const u = lines[j].trim();
        if(u && !u.startsWith('#')){ url=u; i=j; break; }
      }
      if(url) out.push({name,group,logo,url});
    }
  }
  return out;
}

const channels = parseM3U(PLAYLIST);
const video = document.getElementById('video');
const listEl = document.getElementById('list');
const groupsEl = document.getElementById('groups');
const searchEl = document.getElementById('search');
const ph = document.getElementById('ph');
const loader = document.getElementById('loader');
const errEl = document.getElementById('err');
const liveBadge = document.getElementById('liveBadge');
const nowPlaying = document.getElementById('nowPlaying');
const nowGroup = document.getElementById('nowGroup');
const countEl = document.getElementById('count');

let hls = null;
let activeGroup = 'الكل';
let activeUrl = null;

// ---- Groups ----
const groups = ['الكل', ...new Set(channels.map(c=>c.group))];
groups.forEach(g=>{
  const b = document.createElement('button');
  b.textContent = g;
  if(g===activeGroup) b.classList.add('active');
  b.onclick = ()=>{ activeGroup=g; [...groupsEl.children].forEach(x=>x.classList.remove('active')); b.classList.add('active'); render(); };
  groupsEl.appendChild(b);
});

// ---- Render list ----
function render(){
  const q = searchEl.value.trim().toLowerCase();
  const filtered = channels.filter(c=>
    (activeGroup==='الكل' || c.group===activeGroup) &&
    (!q || c.name.toLowerCase().includes(q))
  );
  listEl.innerHTML = '';
  filtered.forEach(c=>{
    const d = document.createElement('div');
    d.className = 'ch' + (c.url===activeUrl?' active':'');
    d.innerHTML = `<img src="${c.logo}" onerror="this.style.visibility='hidden'">
      <div class="meta"><div class="name">${c.name}</div><div class="grp">${c.group}</div></div>`;
    d.onclick = ()=>play(c, d);
    listEl.appendChild(d);
  });
  countEl.textContent = `${filtered.length} قناة`;
}
searchEl.oninput = render;

// ---- Play ----
function play(c){
  activeUrl = c.url;
  render();
  ph.style.display='none';
  errEl.style.display='none';
  loader.style.display='block';
  liveBadge.style.display='none';
  nowPlaying.firstChild.textContent = c.name;
  nowGroup.textContent = c.group;

  if(hls){ hls.destroy(); hls=null; }

  const onPlaying = ()=>{ loader.style.display='none'; liveBadge.style.display='flex'; };

  if(Hls.isSupported()){
    hls = new Hls({ lowLatencyMode:true, enableWorker:true });
    hls.loadSource(c.url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, ()=> video.play().catch(()=>{}));
    hls.on(Hls.Events.ERROR, (e,data)=>{
      if(data.fatal){
        loader.style.display='none';
        if(data.type===Hls.ErrorTypes.NETWORK_ERROR){ hls.startLoad(); }
        else if(data.type===Hls.ErrorTypes.MEDIA_ERROR){ hls.recoverMediaError(); }
        else { showError('تعذّر تشغيل القناة. قد يكون البث غير متاح أو يتطلب صلاحية وصول.'); }
      }
    });
  } else if(video.canPlayType('application/vnd.apple.mpegurl')){
    video.src = c.url;
    video.play().catch(()=>{});
  } else {
    showError('المتصفح لا يدعم تشغيل هذا النوع من البث.');
  }
  video.onplaying = onPlaying;
}

function showError(msg){
  loader.style.display='none';
  liveBadge.style.display='none';
  errEl.textContent = msg;
  errEl.style.display='block';
}

render();
</script>
