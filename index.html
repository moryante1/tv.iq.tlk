<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>إهداء إلى سولي</title>
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Tahoma", sans-serif;
        background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
        color: white;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    .container {
        text-align: center;
        max-width: 600px;
        padding: 30px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        box-shadow: 0 0 30px rgba(0,0,0,0.5);
        animation: fadeIn 2s ease;
    }

    h1 {
        font-size: 40px;
        color: #ff4d6d;
        margin-bottom: 20px;
    }

    p {
        font-size: 18px;
        line-height: 1.8;
        opacity: 0;
        transition: 1s;
    }

    button {
        margin-top: 20px;
        padding: 10px 25px;
        border: none;
        border-radius: 25px;
        background: #ff4d6d;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #ff1e4d;
        transform: scale(1.1);
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(30px);}
        to {opacity: 1; transform: translateY(0);}
    }

    .heart {
        position: absolute;
        color: #ff4d6d;
        font-size: 20px;
        animation: float 5s linear infinite;
    }

    @keyframes float {
        0% {transform: translateY(100vh) scale(1);}
        100% {transform: translateY(-10vh) scale(1.5);}
    }
</style>
</head>
<body>

<div class="container">
    <h1>إلى سولي ❤️</h1>

    <p id="text1">في بداية كلماتي… أهدي هذا القلب إلى أجمل صدفة بحياتي.</p>
    <p id="text2">سولي، يا دفء الروح، يا بنت السودان الطيبة، يا أجمل إحساس.</p>
    <p id="text3">فيكِ لقيت الأمان، وفي صوتك سكون ما لقيته بأي مكان.</p>
    <p id="text4">أحبك بهدوء… بعمق… مثل النيل لما يجري بثبات.</p>

    <button onclick="showText()">اضغط هنا ❤️</button>
</div>

<script>
function showText() {
    document.querySelectorAll("p").forEach((el, i) => {
        setTimeout(() => {
            el.style.opacity = "1";
        }, i * 1000);
    });
}

// قلوب متحركة
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
